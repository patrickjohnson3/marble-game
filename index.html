<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>marble tilt</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game"><div id="marble"></div></div>

<div id="panel">
  <div id="hint">hold phone normally, then tap start</div>
</div>

<button id="settingsToggle" aria-label="settings" title="Settings">⚙</button>

<div id="controls">
  <button id="start">start</button>
</div>

<div id="settingsOverlay" aria-hidden="true">
  <div id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div id="settingsHeader">
      <h2 id="settingsTitle">Settings</h2>
      <button id="closeSettings" aria-label="close settings">×</button>
    </div>
    <button id="neutral" class="secondary">set neutral</button>
    <div id="debug">waiting for sensors...</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
