<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>marble tilt calibrated</title>
<style>
  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#101114;
    font-family:system-ui,-apple-system,Segoe UI,sans-serif;
    color:white;
    touch-action:none;
    overscroll-behavior:none;
  }
  #game{
    position:fixed;
    inset:0;
    background:
      linear-gradient(#ffffff08 1px,transparent 1px),
      linear-gradient(90deg,#ffffff08 1px,transparent 1px),
      radial-gradient(circle at center,#2a2d35,#101114 72%);
    background-size:42px 42px,42px 42px,100% 100%;
  }
  #marble{
    position:absolute;
    width:58px;
    height:58px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    background:
      radial-gradient(circle at 34% 28%,#fff 0 6%,#bce8ff 7% 19%,#2d86dd 42%,#083b75 75%,#031b36 100%);
    box-shadow:0 16px 28px #000a, inset -8px -10px 18px #0018;
    will-change:left,top;
  }
  #panel{
    position:fixed;
    left:12px;
    right:12px;
    top:12px;
    display:grid;
    gap:8px;
    pointer-events:none;
  }
  #hint,#debug{
    border-radius:14px;
    background:#0008;
    padding:10px 12px;
    backdrop-filter:blur(8px);
  }
  #hint{font-size:15px;text-align:center}
  #debug{font:12px/1.35 ui-monospace,Menlo,Consolas,monospace;opacity:.86;white-space:pre-wrap}
  #controls{
    position:fixed;
    left:12px;
    right:12px;
    bottom:calc(12px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
  }
  button{
    flex:1;
    border:0;
    border-radius:999px;
    padding:14px 12px;
    font-size:17px;
    font-weight:700;
    background:white;
    color:#111;
  }
  button.secondary{background:#2e3440;color:white}
</style>
</head>
<body>
<div id="game"><div id="marble"></div></div>

<div id="panel">
  <div id="hint">tap start. hold phone flat-ish, then calibrate.</div>
  <div id="debug">waiting for sensors...</div>
</div>

<div id="controls">
  <button id="start">start</button>
  <button id="calibrate" class="secondary">calibrate</button>
</div>

<script>
(() => {
  const marble = document.getElementById("marble");
  const startBtn = document.getElementById("start");
  const calBtn = document.getElementById("calibrate");
  const hint = document.getElementById("hint");
  const debug = document.getElementById("debug");

  let x = innerWidth / 2, y = innerHeight / 2;
  let vx = 0, vy = 0;

  let rawX = 0, rawY = 0;
  let smoothX = 0, smoothY = 0;
  let zeroX = 0, zeroY = 0;

  let gotOrientation = false;
  let gotMotion = false;
  let using = "none";

  const r = 29;
  const accel = 0.075;       // lower = less twitchy
  const maxTilt = 28;        // clamp angle/accel
  const smoothing = 0.18;    // lower = smoother/slower
  const friction = 0.972;    // lower = stops faster
  const bounce = 0.38;       // wall bounce
  const deadZone = 0.8;      // ignores tiny sensor drift

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function applyDeadZone(v) {
    return Math.abs(v) < deadZone ? 0 : v;
  }

  function resize() {
    x = clamp(x, r, innerWidth - r);
    y = clamp(y, r, innerHeight - r);
  }
  addEventListener("resize", resize);

  function screenAdjusted(gamma, beta) {
    // gamma: left/right tilt, beta: front/back tilt
    // adjust for screen rotation, otherwise landscape feels possessed.
    const angle = screen.orientation && typeof screen.orientation.angle === "number"
      ? screen.orientation.angle
      : (window.orientation || 0);

    let tx = gamma || 0;
    let ty = beta || 0;

    if (angle === 90) {
      [tx, ty] = [ty, -tx];
    } else if (angle === -90 || angle === 270) {
      [tx, ty] = [-ty, tx];
    } else if (angle === 180) {
      tx = -tx;
      ty = -ty;
    }

    return [tx, ty];
  }

  function onOrientation(e) {
    if (e.beta == null || e.gamma == null) return;
    gotOrientation = true;
    using = "deviceorientation";
    const [tx, ty] = screenAdjusted(e.gamma, e.beta);
    rawX = clamp(-tx, -maxTilt, maxTilt);
    rawY = clamp(-ty, -maxTilt, maxTilt);
  }

  function onMotion(e) {
    // fallback only. orientation is usually nicer for this toy.
    if (gotOrientation) return;
    const g = e.accelerationIncludingGravity;
    if (!g) return;
    gotMotion = true;
    using = "devicemotion fallback";
    rawX = clamp((g.x || 0) * 3, -maxTilt, maxTilt);
    rawY = clamp(-(g.y || 0) * 3, -maxTilt, maxTilt);
  }

  async function requestPermissionIfNeeded() {
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      const p = await DeviceOrientationEvent.requestPermission();
      if (p !== "granted") return false;
    }
    if (typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function") {
      const p = await DeviceMotionEvent.requestPermission();
      if (p !== "granted") return false;
    }
    return true;
  }

  async function start() {
    const ok = await requestPermissionIfNeeded();
    if (!ok) {
      hint.textContent = "motion permission denied. check chrome site settings.";
      return;
    }

    addEventListener("deviceorientation", onOrientation, true);
    addEventListener("devicemotion", onMotion, true);

    startBtn.textContent = "running";
    startBtn.disabled = true;
    hint.textContent = "tilt gently. tap calibrate when held neutral.";
  }

  function calibrate() {
    zeroX = rawX;
    zeroY = rawY;
    vx = 0;
    vy = 0;
    hint.textContent = "calibrated. now tilt gently, not like you're steering a pirate ship.";
  }

  startBtn.addEventListener("click", start);
  calBtn.addEventListener("click", calibrate);

  function loop() {
    const targetX = applyDeadZone(rawX - zeroX);
    const targetY = applyDeadZone(rawY - zeroY);

    smoothX += (targetX - smoothX) * smoothing;
    smoothY += (targetY - smoothY) * smoothing;

    vx += smoothX * accel;
    vy += smoothY * accel;

    vx *= friction;
    vy *= friction;

    x += vx;
    y += vy;

    if (x < r) { x = r; vx = -vx * bounce; }
    if (x > innerWidth - r) { x = innerWidth - r; vx = -vx * bounce; }
    if (y < r) { y = r; vy = -vy * bounce; }
    if (y > innerHeight - r) { y = innerHeight - r; vy = -vy * bounce; }

    marble.style.left = x + "px";
    marble.style.top = y + "px";

    debug.textContent =
      "sensor: " + using +
      "\norientation seen: " + gotOrientation +
      " | motion seen: " + gotMotion +
      "\nraw x/y: " + rawX.toFixed(2) + " / " + rawY.toFixed(2) +
      "\nzero x/y: " + zeroX.toFixed(2) + " / " + zeroY.toFixed(2) +
      "\ntilt x/y: " + smoothX.toFixed(2) + " / " + smoothY.toFixed(2) +
      "\nvel x/y: " + vx.toFixed(2) + " / " + vy.toFixed(2);

    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
