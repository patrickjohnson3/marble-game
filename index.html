<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>marble tilt</title>
<script>
  const assetVersion = Date.now();
  const appStylesheet = document.createElement("link");
  appStylesheet.rel = "stylesheet";
  appStylesheet.href = "style.css?v=" + assetVersion;
  document.head.appendChild(appStylesheet);
</script>
</head>
<body>
<div id="game">
  <div id="world">
    <div id="introWalls" class="walls"></div>
    <div id="mapWalls" class="walls"></div>
    <div id="roughPatches"></div>
    <div id="obstacles"></div>
    <div id="marble"></div>
  </div>
</div>

<div id="messageOverlay" aria-live="polite"></div>

<div id="panel">
  <div id="hint">hold phone normally, then tap start</div>
</div>

<button id="settingsToggle" aria-label="settings" title="Settings">⚙</button>

<div id="controls">
  <button id="start">start</button>
</div>

<div id="settingsOverlay" aria-hidden="true">
  <div id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div id="settingsHeader">
      <h2 id="settingsTitle">Settings</h2>
      <button id="closeSettings" aria-label="close settings">×</button>
    </div>
    <button id="neutral" class="secondary">set neutral</button>
    <label class="settingRow" for="speedSetting">
      <span>speed</span>
      <input id="speedSetting" type="range" min="8" max="24" step="1">
    </label>
    <label class="settingRow" for="sensitivitySetting">
      <span>sensitivity</span>
      <input id="sensitivitySetting" type="range" min="0.06" max="0.18" step="0.005">
    </label>
    <label class="settingRow checkboxRow" for="rotationSetting">
      <span>rotation</span>
      <input id="rotationSetting" type="checkbox">
    </label>
    <label class="settingRow checkboxRow" for="hapticsSetting">
      <span>haptics</span>
      <input id="hapticsSetting" type="checkbox">
    </label>
    <div id="debug">waiting for sensors...</div>
  </div>
</div>

<script>
  const appScript = document.createElement("script");
  appScript.type = "module";
  appScript.src = "app.js?v=" + assetVersion;
  document.body.appendChild(appScript);
</script>
</body>
</html>
